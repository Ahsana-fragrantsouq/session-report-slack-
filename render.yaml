services:
  - type: web
    name: shopify-slack-reports
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 60
    envVars:
      - key: SHOPIFY_STORE_DOMAIN
        sync: false
      - key: SHOPIFY_ADMIN_API_TOKEN
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
